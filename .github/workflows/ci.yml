name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          DJANGO_DEBUG: "True"
        run: |
          coverage run --source=accounts,universities manage.py test
          coverage report --fail-under=55
      - name: Validate OpenAPI schema
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          DJANGO_DEBUG: "True"
        run: python manage.py spectacular --validate
      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Install Python for production build
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend dependencies for prerender
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Production build with full prerender
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          DJANGO_DEBUG: "True"
          PRERENDER_REQUIRE_API: "1"
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend dependencies
        run: npm ci --legacy-peer-deps
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        env:
          CI: "true"
          DJANGO_SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          DJANGO_DEBUG: "True"
        run: npm run test:e2e
