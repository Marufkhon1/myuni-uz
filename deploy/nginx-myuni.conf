# MyUni.uz — nginx namunasi (production)
# Frontend: /var/www/myuni/frontend/dist
# Backend: 127.0.0.1:8000 (gunicorn)

upstream myuni_backend {
    server 127.0.0.1:8000;
}

# http { } ichida bo'lishi kerak — server blokidan tashqarida
# Phase 4: faqat social crawlerlar share-preview oladi.
# Googlebot/Bingbot oddiy try_files orqali prerendered HTML (HTML-first) oladi.
map $http_user_agent $myuni_social_bot {
    default 0;
    ~*(facebookexternalhit|Facebot|Twitterbot|TelegramBot|WhatsApp|LinkedInBot|Slackbot|Discordbot|vkShare|Pinterest) 1;
}

server {
    listen 80;
    server_name myuni.uz www.myuni.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myuni.uz www.myuni.uz;

    # ssl_certificate /etc/letsencrypt/live/myuni.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/myuni.uz/privkey.pem;

    client_max_body_size 12M;

    root /var/www/myuni/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://myuni_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Backend sets Cache-Control / X-MyUni-Cache on /api/public/* — do not override.
    }

    # Public sitemap — long CDN TTL via upstream s-maxage; optional edge cache later.
    location = /api/public/sitemap.xml {
        proxy_pass http://myuni_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat SSE — uzoq ulanish
    location ~ ^/api/universities/.+/messages/stream/ {
        proxy_pass http://myuni_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /media/ {
        alias /var/www/myuni/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /admin/ {
        proxy_pass http://myuni_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Phase 4 HTML-first: prerendered route trees for humans + Google.
    # Social bots → share-preview. Missing routes → spa.html (CSR shell), NEVER SSG home.
    location = /spa.html {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
        try_files /spa.html =404;
    }

    location / {
        if ($myuni_social_bot = 1) {
            rewrite ^ /api/public/share-preview/?path=$uri last;
        }
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
        try_files $uri $uri/ $uri/index.html /spa.html;
    }
}
